<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Simplifiedaction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="Simplifiedaction accueil">
        <span class="logo-icon">S</span>
        <span class="logo-text">Simplifiedaction</span>
      </a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Recherche</a>
        <span id="nav-guest">
          <a href="login.html" class="nav-link">Connexion</a>
          <a href="register.html" class="nav-link nav-link--cta">Inscription</a>
        </span>
        <span id="nav-user" hidden>
          <a href="compte.html" class="nav-link">Mon compte</a>
          <button type="button" class="nav-link nav-link--logout" id="btn-logout">Déconnexion</button>
        </span>
      </nav>
    </div>
  </header>

  <main class="main page-main">
    <div class="container page-container page-container--form">
      <h1 class="page-title">Contact</h1>
      <p class="page-intro">Utilise ce formulaire pour envoyer un message a l'equipe Simplifiedaction.</p>

      <form
        class="auth-form"
        action="https://formspree.io/f/xvznpgeg"
        method="POST"
      >
        <label class="auth-label" for="contact-name">Nom</label>
        <input
          class="auth-input"
          id="contact-name"
          name="name"
          type="text"
          autocomplete="name"
          required
        >

        <label class="auth-label" for="contact-email">Email</label>
        <input
          class="auth-input"
          id="contact-email"
          name="email"
          type="email"
          autocomplete="email"
          required
        >

        <label class="auth-label" for="contact-subject">Sujet</label>
        <input
          class="auth-input"
          id="contact-subject"
          name="subject"
          type="text"
          required
        >

        <label class="auth-label" for="contact-message">Message</label>
        <textarea
          class="auth-input auth-input--textarea"
          id="contact-message"
          name="message"
          rows="6"
          required
        ></textarea>

        <input type="hidden" name="_subject" value="Nouveau message - Simplifiedaction">
        <input class="visually-hidden" type="text" name="_gotcha" tabindex="-1" autocomplete="off">

        <button type="submit" class="btn btn--primary btn--full">Envoyer</button>
      </form>

      <p class="contact-help">Formulaire connecte a Formspree.</p>
      <a href="index.html" class="link-back">Retour a l'accueil</a>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">&copy; Simplifiedaction</p>
      <nav class="footer-nav" aria-label="Pied de page">
        <a href="liste-sp500.html">Liste S&P 500</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </footer>
  <script src="js/auth.js"></script>
</body>
</html>
